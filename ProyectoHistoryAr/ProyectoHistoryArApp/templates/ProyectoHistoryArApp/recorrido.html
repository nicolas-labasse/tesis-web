{% extends 'ProyectoHistoryArApp/header.html' %}
{% load static %}

{% block contenidoPagina %}

<section>
    <div class="container">
        <div class="row">
            <div class="col mt-3">
                <div class="card bg-dark text-white">
                    <img src="/media/images/4.jpg" class="card-img" alt="es una imagen que contiene varios de los monumentos mas famosos del mundo">
                    <div class="card-img-overlay">
                      <h1 class="card-title">Recorridos</h1>
                      <div class="container">
                        <div class="row ">
                            <div class="col-12">
                                <form method="GET" enctype="multipart/form-data">
                                    <div class="input-group justify-content-center mt-5">
                                        <div class="form-outline">
                                            <input type="search" style="width: 600px;" id="buscar" name="buscar" class="form-control" placeholder="Buscar" />
                                        </div>
                                        <button type="submit" style="z-index: 0;" class="btn btn-primary">
                                            <i class="fas fa-search"></i>
                                        </button>
                                    </div>
                                  </form>
                            </div>
                        </div>
                      </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<section>
    <div class="container">
        <div class="row">
            <div class="col-6 mt-4">
                <a href="">
                  <div class="card mb-3 ">
                    <div class="row g-0">
                      <div class="col-md-5">
                        <img src="/media/images/1.png" class="img-fluid rounded-start" alt="...">
                      </div>
                      <div class="col-md-7">
                        <div class="card-body">
                          <div class="row">
                            <div class="col-6">
                                <h5 class="card-title">Obelisco - Colon</h5>
                            </div>
                            <div class="col-6 text-end">
                                {% if fav %}
                                <i class="fa-solid fa-star" style="color: #fbff00;"></i>
                                {%else%}
                                <i class="fa-regular fa-star"></i>
                                {%endif%}
                            </div>
                          </div>
                          <div class="container ms-5 mt-3">
                            <div class="row">
                                <div class="col-6">
                                    <p class="card-text mb-1">Inicio: Obelisco</p>
                                </div>
                                <div class="col-6">
                                  <p class="card-text">Fin: Colon</p>
                              </div>
                              <div class="col-10 text-center mt-3">
                                <button type="button" class="btn btn-outline-dark">Ver mas</button>
                              </div>
                            </div>
                          </div>
                        </div>
                        <p class="text-end px-3"><small class="text-muted">Duracion: 35 minutos</small></p>
                      </div>
                    </div>
                </div>
                </a>
            </div>
        </div>
    </div>
</section>

{% endblock %}
